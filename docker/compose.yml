services:
  api:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      PORT: "8000"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: /api
    depends_on:
      - api
    ports:
      - "${WEB_BIND:-0.0.0.0}:${WEB_PORT:-80}:80"
    restart: unless-stopped
